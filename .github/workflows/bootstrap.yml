name: ScrollBoy Bootstrap ROM

permissions:
  contents: write
  # releases: write  # Only needed if using a release action that requires explicit permission; 'contents: write' is often sufficient.

on:
  push:
    branches:
      - master

jobs:
  bootstrap:
    runs-on: macos-latest

    env:
      SCROLLBOY_USER: ${{ secrets.SCROLLBOY_USER }}
      SCROLLBOY_EMAIL: ${{ secrets.SCROLLBOY_EMAIL }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Generate Version ID
        id: version
        run: |
          YEAR=$(date +%Y)
          HASH=$(git rev-parse --short HEAD)
          VERSION="v${YEAR}-${HASH}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Install RGBDS
        run: |
          brew install rgbds

      - name: Build Bootstrap ROM
        run: |
          make

      - name: Create and Push Tag
        run: |
          git config user.name "${{ env.SCROLLBOY_USER }}"
          git config user.email "${{ env.SCROLLBOY_EMAIL }}"
          git tag "${{ env.VERSION }}"
          git push origin "${{ env.VERSION }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ScrollBoy Bootstrap ROM ${{ env.VERSION }}
          files: gbc_bios.bin
          generate_release_notes: true