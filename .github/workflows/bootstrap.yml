name: ScrollBoy Bootstrap ROM

permissions:
  contents: write

on:
  push:
    branches:
      - master

jobs:
  bootstrap:
    strategy:
      matrix:
        rgbds: ['']
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Generate Version ID
        run: |
          YEAR=$(date +%Y)
          HASH=$(git rev-parse --short HEAD)
          VERSION="v${YEAR}-${HASH}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Install RGBDS
        run: |
          brew install ${{ matrix.rgbds }} rgbds

      - name: Build Bootstrap ROM
        run: |
          make

      - name: Upload Bootstrap ROM
        run: |
          BRANCH="prebuilts"

          git config user.name "ScrollBoy Bot"
          git config user.email "noreply.scrollboy@voltaccept.com"

          git fetch origin

          if git ls-remote --heads origin $BRANCH | grep $BRANCH >/dev/null; then
            git checkout $BRANCH
          else
            git checkout --orphan $BRANCH
          fi

          git rm -rf . || true
          git clean -fdx

          mkdir -p "$VERSION"
          cp gbc_bios.bin "$VERSION/"
          mkdir -p latest
          cp gbc_bios.bin latest/

          git add .
          git commit -m "Upload Bootstrap $VERSION" || echo "NOTHING TO COMMIT"
          git push origin $BRANCH --force
