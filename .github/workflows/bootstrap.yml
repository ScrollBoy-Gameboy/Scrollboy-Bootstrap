name: ScrollBoy Bootstrap ROM

permissions:
  contents: write

on:
  push:
    branches:
      - master

jobs:
  bootstrap:
    strategy:
      matrix:
        rgbds: ['']

    runs-on: macos-latest

    env:
      SCROLLBOY_USER: ${{ secrets.SCROLLBOY_USER }}
      SCROLLBOY_EMAIL: ${{ secrets.SCROLLBOY_EMAIL }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Generate Version ID
        id: version
        run: |
          YEAR=$(date +%Y)
          HASH=$(git rev-parse --short HEAD)
          VERSION="v${YEAR}-${HASH}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Install RGBDS
        run: |
          brew install ${{ matrix.rgbds }} rgbds

      - name: Build Bootstrap ROM
        run: |
          make

      - name: Upload Bootstrap ROM
        run: |
          VERSION="${{ env.VERSION }}"

          git config user.name "${{ env.SCROLLBOY_USER }}"
          git config user.email "${{ env.SCROLLBOY_EMAIL }}"

          git fetch origin
          git checkout prebuilt

          mkdir -p "$VERSION"
          cp gbc_bios.bin "$VERSION/"

          rm -rf latest
          mkdir -p latest
          cp gbc_bios.bin latest/

          git add "$VERSION" latest
          git commit -m "Upload Bootstrap $VERSION" || echo "NOTHING TO COMMIT"

          git push origin prebuilt